services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8100:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8101:3001"
    env_file:
      - ./backend/.env
    environment:
      # Override CORS to allow the production subdomain.
      # Replace YOUR_SERVER_IP with the actual IP of this server.
      - CORS_ORIGIN=http://di.YOUR_SERVER_IP.nip.io
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  uploads:
