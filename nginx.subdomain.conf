# Host-level Nginx reverse proxy for the di.<YOUR_SERVER_IP>.nip.io subdomain
# Copy this file to: /etc/nginx/sites-available/di.nip.io
# Then: sudo ln -s /etc/nginx/sites-available/di.nip.io /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# Replace <YOUR_SERVER_IP> with the actual public IP of this server.

server {
    listen 80;
    server_name di.<YOUR_SERVER_IP>.nip.io;

    # ---------- Backend API ----------
    location /api/ {
        proxy_pass         http://127.0.0.1:8101;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large file uploads (API docs / media)
        client_max_body_size 110M;

        # Timeouts for slow Oracle queries
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }

    # ---------- Frontend SPA ----------
    location / {
        proxy_pass         http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
